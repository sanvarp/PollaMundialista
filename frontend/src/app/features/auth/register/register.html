<section class="auth">
  <app-shader-hero />
  <div class="auth__card">
    <p class="auth__eyebrow">Polla Mundialista</p>
    <h1 class="auth__title" splitReveal>Crear cuenta</h1>
    <p class="auth__subtitle">Únete y arma tu polla del Mundial 2026.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Nombre para mostrar</span>
        <input
          type="text"
          formControlName="displayName"
          autocomplete="nickname"
          placeholder="Tu nombre"
        />
        @if (form.controls.displayName.touched && form.controls.displayName.invalid) {
          <small class="field__error">Ingresa un nombre (máx. 60 caracteres).</small>
        }
      </label>

      <label class="field">
        <span>Correo</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tu@correo.com"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="field__error">Ingresa un correo válido.</small>
        }
      </label>

      <label class="field">
        <span>Contraseña</span>
        <div class="field__control">
          <input
            [type]="reveal() ? 'text' : 'password'"
            formControlName="password"
            autocomplete="new-password"
            placeholder="Mín. 8, mayús/minús/número"
          />
          <button
            type="button"
            class="field__eye"
            [attr.aria-label]="
              reveal() ? 'Ocultar contraseña' : 'Mostrar contraseña (mantén presionado)'
            "
            [attr.aria-pressed]="reveal()"
            (mousedown)="$event.preventDefault()"
            (pointerdown)="reveal.set(true)"
            (pointerup)="reveal.set(false)"
            (pointerleave)="reveal.set(false)"
            (pointercancel)="reveal.set(false)"
            (keydown.space)="$event.preventDefault(); reveal.set(true)"
            (keyup.space)="reveal.set(false)"
            (keydown.enter)="reveal.set(true)"
            (keyup.enter)="reveal.set(false)"
            (blur)="reveal.set(false)"
          >
            @if (reveal()) {
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="field__error"
            >Mínimo 8 caracteres, con mayúscula, minúscula y número.</small
          >
        }
      </label>

      @if (error()) {
        <p class="auth__alert" role="alert">{{ error() }}</p>
      }

      <button type="submit" class="btn btn--accent" [disabled]="loading()">
        {{ loading() ? 'Creando…' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="auth__switch">¿Ya tienes cuenta? <a routerLink="/login">Entra</a></p>
  </div>
</section>
