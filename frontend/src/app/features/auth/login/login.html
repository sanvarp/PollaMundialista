<section class="auth">
  <app-shader-hero />
  <div class="auth__card">
    <p class="auth__eyebrow">Polla Mundialista</p>
    <h1 class="auth__title" splitReveal>Entrar</h1>
    <p class="auth__subtitle">Predice. Suma puntos. Domina el ranking.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Correo</span>
        <input type="email" formControlName="email" autocomplete="email" placeholder="tu@correo.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="field__error">Ingresa un correo válido.</small>
        }
      </label>

      <label class="field">
        <span>Contraseña</span>
        <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="field__error">La contraseña es obligatoria.</small>
        }
      </label>

      @if (error()) {
        <p class="auth__alert" role="alert">{{ error() }}</p>
      }

      <button type="submit" class="btn btn--accent" [disabled]="loading()">
        {{ loading() ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>

    <p class="auth__switch">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
    </p>
  </div>
</section>
