<div class="row" [class.row--finished]="isFinished()">
  <div class="row__info">
    <span class="row__group">Grupo {{ match().group }}</span>
    <span class="row__match">{{ match().homeTeam.code }} vs {{ match().awayTeam.code }}</span>
    <time class="row__time">{{ match().kickoffUtc | date: 'd MMM HH:mm' }}</time>
    @if (isFinished()) {
      <span class="row__status">Final</span>
    }
  </div>

  <div class="row__entry">
    <div class="stepper">
      <button type="button" (click)="step('home', -1)" aria-label="menos local">−</button>
      <input
        class="stepper__val stepper__input"
        type="text"
        inputmode="numeric"
        maxlength="2"
        [value]="home()"
        (input)="onType('home', $event)"
        (keydown)="onKeydown('home', $event)"
        (focus)="selectOnFocus($event)"
        aria-label="goles local"
      />
      <button type="button" (click)="step('home', 1)" aria-label="más local">+</button>
    </div>
    <span class="row__sep">:</span>
    <div class="stepper">
      <button type="button" (click)="step('away', -1)" aria-label="menos visitante">−</button>
      <input
        class="stepper__val stepper__input"
        type="text"
        inputmode="numeric"
        maxlength="2"
        [value]="away()"
        (input)="onType('away', $event)"
        (keydown)="onKeydown('away', $event)"
        (focus)="selectOnFocus($event)"
        aria-label="goles visitante"
      />
      <button type="button" (click)="step('away', 1)" aria-label="más visitante">+</button>
    </div>

    <button type="button" class="row__save" [disabled]="saving() || clearing()" (click)="save()">
      {{ saving() ? '…' : isFinished() ? 'Actualizar' : 'Guardar' }}
    </button>

    @if (isFinished()) {
      @if (confirming()) {
        <span class="row__confirm">¿Revertir?</span>
        <button type="button" class="row__yes" [disabled]="clearing()" (click)="clear()">
          {{ clearing() ? '…' : 'Sí' }}
        </button>
        <button type="button" class="row__no" [disabled]="clearing()" (click)="cancelClear()">No</button>
      } @else {
        <button type="button" class="row__clear" [disabled]="saving()" (click)="askClear()" title="Revertir a programado y borrar puntos">
          Revertir
        </button>
      }
    }

    @if (justSaved()) {
      <span class="row__flash">✓</span>
    } @else if (error()) {
      <span class="row__error">{{ error() }}</span>
    }
  </div>
</div>
