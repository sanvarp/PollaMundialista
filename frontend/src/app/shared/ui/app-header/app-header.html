<header class="hdr">
  <a routerLink="/" class="hdr__brand">
    <span class="hdr__dot"></span>
    Polla<span class="hdr__brand-accent">Mundialista</span>
  </a>

  <nav class="hdr__nav">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Partidos</a>
    <a routerLink="/leaderboard" routerLinkActive="is-active">Tabla</a>
    @if (auth.isAdmin()) {
      <a routerLink="/admin" routerLinkActive="is-active">Admin</a>
    }
  </nav>

  <div class="hdr__user">
    <span class="hdr__name">{{ auth.displayName() }}</span>
    <button type="button" class="hdr__logout" (click)="logout()">Salir</button>
  </div>
</header>
