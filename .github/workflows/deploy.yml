name: Deploy

# Runs on push to main. Tests gate the deploy: API and frontend only deploy
# if build + tests pass. Azure auth is passwordless via OIDC.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for azure/login
  contents: read

jobs:
  test:
    name: Build + test (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Backend build + test
        working-directory: backend
        run: |
          dotnet restore
          dotnet build --no-restore -c Release
          dotnet test --no-build -c Release
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy-api:
    name: Deploy API (Container Apps)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Build image in ACR
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az acr build --registry ${{ vars.ACR_NAME }} \
            --image polla-api:${{ github.sha }} \
            --image polla-api:latest \
            -f backend/Dockerfile backend
      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/polla-api:${{ github.sha }}

  deploy-frontend:
    name: Deploy Frontend (Static Web Apps)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend/dist/frontend/browser
          skip_app_build: true
